services:
  vllm_qwen_chat:
    image: ${IMAGE_NAME}
    container_name: ${CONTAINER_NAME}
    network_mode: host
    ipc: host
    privileged: true
    restart: unless-stopped
    gpus: all
    ulimits:
      memlock: -1
      stack: 67108864
    environment:
      HF_TOKEN: ${HF_TOKEN}
      VLLM_API_KEY: ${VLLM_API_KEY}
      MODEL_ROOT: ${MODEL_ROOT}
      TOKENIZER_ROOT: ${TOKENIZER_ROOT}
      SERVED_MODEL_NAME: ${SERVED_MODEL_NAME}
      VLLM_BIND_HOST: ${VLLM_BIND_HOST}
      VLLM_PORT: ${VLLM_PORT}
      INTERNAL_VLLM_PORT: ${INTERNAL_VLLM_PORT}
      GPU_MEMORY_UTILIZATION: ${GPU_MEMORY_UTILIZATION}
      MAX_MODEL_LEN: ${MAX_MODEL_LEN}
      MAX_NUM_BATCHED_TOKENS: ${MAX_NUM_BATCHED_TOKENS}
      MAX_NUM_SEQS: ${MAX_NUM_SEQS}
      SCHEDULING_POLICY: ${SCHEDULING_POLICY}
      KV_CACHE_DTYPE: ${KV_CACHE_DTYPE}
      KV_CACHE_MEMORY_BYTES: ${KV_CACHE_MEMORY_BYTES}
      ASYNC_SCHEDULING: ${ASYNC_SCHEDULING}
      ATTENTION_BACKEND: ${ATTENTION_BACKEND}
      REASONING_PARSER: ${REASONING_PARSER}
      TOOL_CALL_PARSER: ${TOOL_CALL_PARSER}
      CHAT_TEMPLATE_PATH: ${CHAT_TEMPLATE_PATH}
      DEFAULT_CHAT_TEMPLATE_KWARGS: ${DEFAULT_CHAT_TEMPLATE_KWARGS}
      SPECULATIVE_CONFIG: ${SPECULATIVE_CONFIG}
      QUANTIZATION: ${QUANTIZATION}
      LOAD_FORMAT: ${LOAD_FORMAT}
      CALCULATE_KV_SCALES: ${CALCULATE_KV_SCALES}
      VLLM_TEST_FORCE_FP8_MARLIN: ${VLLM_TEST_FORCE_FP8_MARLIN}
      VLLM_MARLIN_USE_ATOMIC_ADD: ${VLLM_MARLIN_USE_ATOMIC_ADD}
      ENABLE_PR38361_CANDIDATE: ${ENABLE_PR38361_CANDIDATE}
      ENABLE_QWEN35_CHAT_TEMPLATE_FIX: ${ENABLE_QWEN35_CHAT_TEMPLATE_FIX}
      FLASHINFER_DISABLE_VERSION_CHECK: ${FLASHINFER_DISABLE_VERSION_CHECK}
      HF_HUB_OFFLINE: ${HF_HUB_OFFLINE}
      TRANSFORMERS_OFFLINE: ${TRANSFORMERS_OFFLINE}
      VLLM_HTTP_TIMEOUT_KEEP_ALIVE: ${VLLM_HTTP_TIMEOUT_KEEP_ALIVE}
      VLLM_TUNED_CONFIG_FOLDER: ${VLLM_TUNED_CONFIG_FOLDER}
      OPTIMIZATION_LEVEL: ${OPTIMIZATION_LEVEL}
      PERFORMANCE_MODE: ${PERFORMANCE_MODE}
      OVERRIDE_GENERATION_CONFIG: ${OVERRIDE_GENERATION_CONFIG}
      ENABLE_TOOLCALL_SANITIZER: ${ENABLE_TOOLCALL_SANITIZER}
      OTLP_TRACES_ENDPOINT: ${OTLP_TRACES_ENDPOINT:-}
      OTLP_TRACES_DETAIL: ${OTLP_TRACES_DETAIL:-all}
    volumes:
      - ${MODELS_DIR}:/models
      - ${HF_CACHE_DIR}:/root/.cache/huggingface
      - ${VLLM_CACHE_DIR}:/root/.cache/vllm
      - ${FLASHINFER_CACHE_DIR}:/root/.cache/flashinfer
      - ${TRITON_CACHE_DIR}:/root/.triton
      - ./moe-configs:/workspace/moe-configs:ro
      - ./:/workspace/deploy
    command: ["/bin/bash", "/workspace/deploy/entrypoint.sh"]
